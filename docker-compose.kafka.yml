# Couche streaming temps reel : Kafka + producer + consumer (competence C2.2).
#
# Architecture Lambda : la couche batch (pipeline pandas / Spark) et cette couche
# streaming alimentent la meme couche de service (MySQL / Mongo + API).
#
# Demarrer le broker et le consumer :
#   docker compose -f docker-compose.yml -f docker-compose.kafka.yml up -d kafka sales-consumer
#
# Lancer un flux de ventes (producer ponctuel) :
#   docker compose -f docker-compose.yml -f docker-compose.kafka.yml run --rm sales-producer
#
# Kafka tourne en mode KRaft (sans Zookeeper) pour rester leger.

services:
  kafka:
    image: bitnami/kafka:3.7
    restart: unless-stopped
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # Consommateur temps reel : ecrit les agregats dans MySQL (table stream_sales_yearly).
  sales-consumer:
    build: .
    working_dir: /app
    command: python pipeline/jobs/streaming/sales_consumer.py --window 50
    restart: unless-stopped
    environment:
      UDE_KAFKA_BOOTSTRAP: kafka:9092
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-urban_data_explorer}
      MYSQL_USER: ${MYSQL_USER:-urban}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-urban}
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - .:/app

  # Producteur ponctuel : rejoue un flux de ventes dans le topic.
  sales-producer:
    build: .
    profiles: ["tools"]
    working_dir: /app
    command: python pipeline/jobs/streaming/sales_producer.py --rate 20 --limit 2000
    environment:
      UDE_KAFKA_BOOTSTRAP: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - .:/app
