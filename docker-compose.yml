services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-urban_data_explorer}
      MYSQL_USER: ${MYSQL_USER:-urban}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-urban}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_EXPOSE_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "${MONGO_EXPOSE_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build: .
    working_dir: /app
    command: uvicorn api.app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment: &app_env
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-urban_data_explorer}
      MYSQL_USER: ${MYSQL_USER:-urban}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-urban}
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DATABASE: ${MONGO_DATABASE:-urban_data_explorer}
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  pipeline:
    build: .
    profiles: ["tools"]
    working_dir: /app
    command: python pipeline/run_imports.py list
    environment:
      <<: *app_env
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  mysql_data:
  mongo_data:
